name: Contract Drift Gate

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

jobs:
  drift:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        node:
          - 24

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Install Node dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Verify fast Gate 0 checks
        run: npm test

      - name: Run smoke doctor for DX metrics
        run: npm run smoke:doctor
        continue-on-error: true

      - name: Regenerate OpenAPI artifact
        run: npm run api:openapi

      - name: Regenerate Dart client placeholder
        run: npm run api-client:generate

      - name: Verify generated contract artifacts are fresh
        run: git diff --exit-code -- packages/api-contracts/generated/gate0.openapi.json packages/api-contracts/dart/thai_meet_api_client.dart

      - name: Verify whitespace
        run: git diff --check

      - name: Upload smoke run metrics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-runs-${{ matrix.os }}-node-${{ matrix.node }}
          path: .thai-meet/smoke-runs/*.json
          if-no-files-found: ignore

  gate1-postgres:
    name: Gate 1 Postgres smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: thai_meet
          POSTGRES_PASSWORD: thai_meet
          POSTGRES_DB: thai_meet
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U thai_meet -d thai_meet"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://thai_meet:thai_meet@localhost:5432/thai_meet
      PERSISTENCE_MODE: database

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Node dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Run Gate 1 Postgres smoke
        run: |
          pnpm exec prisma generate --config prisma.config.ts
          npm run db:migrate
          npm run gate1:seed:database
          npm run gate1:live-smoke
