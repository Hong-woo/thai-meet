name: AWS CI Deploy

# AWS CI/deploy pipeline is configured for Gate 0 production readiness.

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION || vars.AWS_REGION }}
  EC2_HOST: ${{ secrets.EC2_HOST || vars.EC2_HOST }}
  EC2_USER: ${{ secrets.EC2_USER || vars.EC2_USER }}
  EC2_APP_DIR: ${{ secrets.EC2_APP_DIR || vars.EC2_APP_DIR }}
  EC2_SERVICE_NAME: ${{ secrets.EC2_SERVICE_NAME || vars.EC2_SERVICE_NAME }}

jobs:
  deploy:
    name: Build and deploy API
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Verify Gate 0 production readiness
        run: npm run production:check

      - name: Verify contract drift
        run: npm test

      - name: Check AWS deploy settings
        id: aws-deploy-preflight
        shell: bash
        env:
          EC2_SSH_PRIVATE_KEY_B64: ${{ secrets.EC2_SSH_PRIVATE_KEY_B64 }}
        run: |
          missing=0
          for key in AWS_REGION EC2_HOST EC2_USER EC2_SSH_PRIVATE_KEY_B64 EC2_APP_DIR EC2_SERVICE_NAME; do
            if [ -z "${!key}" ]; then
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "AWS EC2 deploy skipped: missing EC2 deployment settings"
            echo "deploy_ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build API image
        if: ${{ steps.aws-deploy-preflight.outputs.deploy_ready == 'true' }}
        run: docker build -t "thai-meet-api:${{ github.sha }}" -f apps/api/Dockerfile .

      - name: Package API image
        if: ${{ steps.aws-deploy-preflight.outputs.deploy_ready == 'true' }}
        run: docker save "thai-meet-api:${{ github.sha }}" | gzip > thai-meet-api.tar.gz

      - name: Prepare EC2 SSH key
        if: ${{ steps.aws-deploy-preflight.outputs.deploy_ready == 'true' }}
        shell: bash
        env:
          EC2_SSH_PRIVATE_KEY_B64: ${{ secrets.EC2_SSH_PRIVATE_KEY_B64 }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/thai-meet-ec2
          chmod 600 ~/.ssh/thai-meet-ec2
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Copy API image to EC2
        if: ${{ steps.aws-deploy-preflight.outputs.deploy_ready == 'true' }}
        run: |
          ssh -i ~/.ssh/thai-meet-ec2 "$EC2_USER@$EC2_HOST" "mkdir -p '$EC2_APP_DIR'"
          scp -i ~/.ssh/thai-meet-ec2 thai-meet-api.tar.gz "$EC2_USER@$EC2_HOST:$EC2_APP_DIR/thai-meet-api.tar.gz"

      - name: Load API image and restart EC2 service
        if: ${{ steps.aws-deploy-preflight.outputs.deploy_ready == 'true' }}
        run: |
          ssh -i ~/.ssh/thai-meet-ec2 "$EC2_USER@$EC2_HOST" "
            set -e
            docker load -i '$EC2_APP_DIR/thai-meet-api.tar.gz'
            docker tag 'thai-meet-api:${{ github.sha }}' thai-meet-api:latest
            sudo systemctl restart '$EC2_SERVICE_NAME'
          "
